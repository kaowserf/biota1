workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: 16.2
    scripts:
      - name: Set up code signing
        script: |
          # Create a new private key for certificate signing
          app-store-connect create-certificate \
            --type IOS_DISTRIBUTION \
            --save || true

          # Fetch signing files (certificate + profile), create if missing
          app-store-connect fetch-signing-files "com.biota1.biota1Ad" \
            --type IOS_APP_STORE \
            --create

          # Initialize keychain and apply profiles
          keychain initialize
          xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build Flutter iOS (no codesign)
        script: |
          flutter build ios \
            --release \
            --no-codesign
      - name: Archive and export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner
    artifacts:
      - build/ios/ipa/*.ipa
      - '**/*.ipa'
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
