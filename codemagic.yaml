workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.biota1.biota1Ad
      flutter: stable
      xcode: 16.2
      groups:
        - appstore_credentials
    scripts:
      - name: Set up code signing
        script: |
          app-store-connect fetch-signing-files com.biota1.biota1Ad \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/codemagic.key \
            || app-store-connect fetch-signing-files com.biota1.biota1Ad \
              --type IOS_APP_STORE \
              --create
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Set up code signing settings
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
