workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: 16.2
      vars:
        CERTIFICATE_PRIVATE_KEY_PATH: /tmp/cert_key.pem
    scripts:
      - name: Generate private key
        script: |
          openssl genrsa -out $CERTIFICATE_PRIVATE_KEY_PATH 2048
          echo "Private key generated"
      - name: Create certificate and fetch profiles
        script: |
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key @file:$CERTIFICATE_PRIVATE_KEY_PATH \
            --save
          app-store-connect fetch-signing-files "com.biota1.biota1Ad" \
            --type IOS_APP_STORE \
            --certificate-key @file:$CERTIFICATE_PRIVATE_KEY_PATH \
            --create
      - name: Set up keychain and profiles
        script: |
          keychain initialize
          xcode-project use-profiles
          echo "=== Certs in keychain ==="
          security find-identity -v -p codesigning
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build and sign IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - External Testers
